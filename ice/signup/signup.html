<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {background: rgb(120, 96, 64); }

        #formContainer {
            border: 10px darkblue solid;
            border-radius: 25px;
            width: 400px;
            height: 700px;
            justify-self: center;
            background-color: white;
        }

        #myForm {
            display:grid;
            justify-content: center;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 195px 1.7fr 1fr;
        }

        #additionaloptions {
            background-color: cyan;
            margin: 10px 100px 10px 100px;
            grid-row: 3;
            grid-column: span 2;
        }

        #top {
            background-color: pink;
            width: 100%;
            height: 175px;
            grid-row: 1;
            grid-column: span 2;
            background: url(../signup/images/jesus_feeds_5000.jpeg);
            background-size: cover; 
            align-content: center;
            justify-items: center;
            color: white;
            text-shadow: 2px 1px black;
            border-radius: 15px 15px 0 0;
        }

        #closeBtn {margin: 0px 10px -10px 10px;}

        #middle {
            grid-row: 2;
            grid-column: span 2;
            display: grid;
            /* background-color: red; */
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr;
            justify-items: left;
            margin-left: 20px;
            gap: 25px;
        }
        
        h1 {margin-top: 50px;}

        #middle h3 {
            grid-column: span 2;
            grid-row: 1;
            justify-self: center;
        }

        #middle label {grid-column: 1;}

        #middle input, div {
            grid-column: 2;
            height: 65%;
        }

        #middle section {
            justify-self: center;
            grid-column: span 2;
        }

        #scriptures {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 5px;
        }

        #scriptures img{
            width: 76px;
            margin-top: 63px;
        }

        #leftcorner {   border-radius: 0 0 0 15px;  }
        #rightcorner {  border-radius: 0 0 15px 0;  }

    </style>




</head>

<body>
    <div id="formContainer">
        
        <form id="myForm">
        
            <div id="top">
                <button type="button" id="closeBtn">X</button>
                <h1>Daily Feed</h1>
                <h2>Scripture a Day</h2>
            </div>

            <div id="middle">
                <h3>Sign Up for Daily Scripture Feed</h3>
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>

                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section>
                    <button type="submit">Submit</button>
                </section>
            </div>

            <div id="scriptures">
                <img id="leftcorner" src="../signup/images/old_testament.webp" alt="Old Testament Cover">
                <img src="../signup/images/new_testament.webp" alt="New Testament Cover">
                <img src="../signup/images/book_of_mormon.webp" alt="Book of Mormon Cover">
                <img src="../signup/images/doctrine_and_covenants.webp" alt="Doctrine and Covenants Cover">
                <img id="rightcorner" src="../signup/images/pearl_of_great_price.webp" alt="Pearl of Great Price Cover">
            </div>

        </form>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
