<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->


        <table class="blueTable">
          <thead>
            <tr>
              <th class="tablecol1">Speaker</th>
              <th class="tablecol2">Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
          </thead>
            <tbody>
              <tr class="tablecol1"><td>Neihlee Muir</td><td>I Will Prepare the Way Before You</td><td>BYU Idaho</td><td>2026</td></tr>
              <tr class="tablecol2"><td>Elder Bruce C. & Sister Marie Hafen</td><td>“Severe Mercy”—Love and Sacrifice</td><td>BYU Idaho</td><td>2026</td></tr>
              <tr><td>Jennifer Platt</td><td>Washing Their Nets</td><td>BYU Idaho</td><td>2026</td></tr>
            </tbody>
          </tr> 
      </table>

      <div id="formbox">
        <form class="form">
          <label for="speaker">Speaker: </label>
          <input type="text">

          <label for="speaker">Title: </label>
          <input type="text">

          <label for="speaker">Location: </label>
          <input type="text">

          <label for="speaker">Year: </label>
          <input type="text">

          <input type="submit" value="Submit">
        </form>
      </div>
      </div>
    </main>
  </div>
</body>
</html>
